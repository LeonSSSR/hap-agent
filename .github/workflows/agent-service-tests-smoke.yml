name: agent-service smoke tests

on:
  push:
    branches:
      - main
      - master
      - release/**
  pull_request:
  workflow_dispatch:

jobs:
  readonly-real-data-smoke:
    name: readonly-real-data-smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/agent-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/agent-service/requirements.txt
            backend/agent-service/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run readonly real data smoke tests
        run: pytest -m smoke

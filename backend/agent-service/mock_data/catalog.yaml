- resource_key: platform.ml.pipeline.node.list
  source: mock
  replaceable: true
  version: 1.0.0
  scenario: platform_ml_lifecycle_analysis
  schema_ref: mock.schema.platform.ml.pipeline.node.list
  fallback_to_real: false
  description: 平台 ML 生命周期链路分析所需的结构化节点 mock 数据，可替换为真实 workflow/服务拓扑。
  payload:
    nodes:
    - id: input_node
      name: 对话输入
      status: ready
      ui_action_id: chat_input

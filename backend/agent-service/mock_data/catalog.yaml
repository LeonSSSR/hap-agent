      name: Skill 选择
      status: ready
      ui_action_id: skill_picker
    - id: intent_parse_node
      name: Agent 理解结果
      status: ready
      ui_action_id: understanding_panel
    - id: risk_evaluate_node
      name: 风险评估
      status: ready
      ui_action_id: risk_badge
    - id: permission_check_node
      name: 权限校验
      status: ready
      ui_action_id: permission_panel
    - id: data_prepare_node
      name: 准备数据
      status: ready
      ui_action_id: ml.data.prepare
    - id: training_submit_node
      name: 发起训练
      status: ready
      ui_action_id: ml.training.submit
    - id: model_register_node
      name: 注册模型版本
      status: ready
      ui_action_id: ml.model.register
    - id: evaluation_node
      name: 评估与发布
      status: ready
      ui_action_id: ml.evaluation
    - id: deploy_node
      name: 部署推理服务
      status: ready
      ui_action_id: ml.deploy
    - id: inference_test_node
      name: 在线推理
      status: ready
      ui_action_id: ml.inference.test
    - id: governance_node
      name: 后续治理
      status: ready
      ui_action_id: ml.governance
    updated_at: '2026-05-28T00:00:00Z'
  trace_id: mock-trace-platform-ml-pipeline-node-list-platform_ml_lifecycle_analysis
  audit_id: mock-audit-platform-ml-pipeline-node-list-platform_ml_lifecycle_analysis

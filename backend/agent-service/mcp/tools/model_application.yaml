- tool_name: inference_service_deploy
  title: 推理服务部署
  description: High-risk inference service deployment revision creation.
  source: platform
  risk_level: high
  permission_scope:
  - inference.deploy.write
  - inference.deploy.read
  input_schema:
    type: object
    properties:
      model_version_id:
        type: string
      deployment_target:
        type: object
  output_schema:
    type: object
    properties:
      service_id:
        type: string
      endpoint:
        type: string
  resource_type: api
  replaceable_mock: true
  append_only_policy: append_only
  provider:
    mock: true
    real: true
  realization_stage: p2_batch_3_high_risk_request
  realization_policy:
    request_or_revision_only: true
    direct_publish_or_deploy_forbidden: true
    requires_confirmation: true
    requires_approval: true
    requires_idempotency_key: true
    requires_audit: true
    requires_failure_compensation: true

domain: model_application
tools:
- tool_name: cicd_deploy_request
  title: 触发 CI/CD 部署
  description: Trigger CI/CD deployment.
  source: platform
  risk_level: high
  permission_scope:
  - inference.deploy.write
  - model.publish.request
  input_schema:
    type: object
    properties:
      pipeline_id:
        type: string
      model_version_id:
        type: string
  output_schema:
    type: object
    properties:
      deploy_id:
        type: string
      status:
        type: string
  resource_type: api
  replaceable_mock: true
  append_only_policy: append_only
  provider:
    mock: true
    real: true
  realization_stage: p2_batch
  realization_policy:
    real_enabled_first: true
- tool_name: cicd_pipeline_catalog_query

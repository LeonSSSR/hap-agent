- tool_name: training_job_create
  title: 训练任务创建
  description: Append-only training job creation.
  source: platform
  risk_level: medium
  permission_scope:
  - training.write
  - training.read
  input_schema:
    type: object
    properties:
      dataset_version_id:
        type: string
      training_config:
        type: object
  output_schema:
    type: object
    properties:
      training_job_id:
        type: string
      run_id:
        type: string
  resource_type: api
  replaceable_mock: true
  append_only_policy: append_only
  provider:
    mock: true
    real: true
  realization_stage: p2_batch_2_append_only_write
  realization_policy:
    real_enabled_after_readonly: true
    requires_confirmation: true
    requires_idempotency_key: true
    requires_append_only_validation: true
    requires_audit: true
    requires_failure_compensation: true
